<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ✨</title>
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #f0e6ff, #d8e2dc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- BACKGROUND PARTICLES (STARS/BUBBLES) --- */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- MAIN CONTAINER (GLASSMORPHISM) --- */
        .container {
            position: relative;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3), 
                        0 4px 12px rgba(0, 0, 0, 0.05);
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- AUDIO CONTROLLER --- */
        .audio-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.7);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .audio-control:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.9);
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 2.5rem;
            color: #ff4d6d;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            font-weight: 800;
        }

        .typing-container {
            min-height: 100px;
            margin-bottom: 30px;
        }

        .text-message {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a4a4a;
            font-weight: 500;
            display: inline;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #ff4d6d;
            margin-left: 3px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* --- BIRTHDAY CAKE ANIMATION --- */
        .cake-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .cake {
            position: relative;
            width: 120px;
            height: 70px;
            background: #ffb3c1;
            border-radius: 10px 10px 4px 4px;
            box-shadow: inset 0 5px 0 #ff8fa3;
        }

        .cake::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 120px;
            height: 12px;
            background: #fff0f3;
        }

        .cake::after {
            content: '';
            position: absolute;
            top: 40px;
            left: 0;
            width: 120px;
            height: 8px;
            background: #ff758f;
        }

        .candle {
            position: absolute;
            bottom: 70px;
            width: 8px;
            height: 35px;
            background: linear-gradient(to top, #c77dff, #e0aaff);
            border-radius: 3px 3px 0 0;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 18px;
            background: #ff9e00;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ff9e00, 0 0 20px #ff9e00;
            animation: flicker 1.2s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(0.9) rotate(-2deg); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1.1) rotate(3deg); opacity: 1; }
        }

        /* --- BUTTONS & SURPRISE BOX --- */
        .btn-premium {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .btn-premium:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 25px rgba(255, 77, 109, 0.4);
        }

        .btn-premium:active {
            transform: translateY(-1px);
        }

        .surprise-box {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 0;
        }

        .surprise-box.show {
            max-height: 200px;
            margin-top: 25px;
        }

        .surprise-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px dashed rgba(255, 77, 109, 0.4);
            border-radius: 16px;
            padding: 20px;
            color: #d90429;
            font-size: 1.1rem;
            font-weight: 600;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- FLOATING BALLOONS --- */
        .balloon {
            position: fixed;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            z-index: 2;
            opacity: 0.85;
            animation: floatUp 8s linear forwards;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 22px;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            border-bottom: 8px solid currentColor;
            filter: brightness(0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            50% { transform: translateY(-50vh) translateX(30px) rotate(5deg); }
            100% { transform: translateY(-120vh) translateX(-20px) rotate(-5deg); }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .text-message { font-size: 1rem; }
            .container { padding: 30px 20px; }
            .cake-wrapper { width: 120px; height: 120px; }
            .cake { width: 100px; height: 60px; }
            .cake::before { width: 100px; }
            .cake::after { width: 100px; }
            .candle { bottom: 60px; height: 30px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <button class="audio-control" id="audioBtn" title="Play/Pause Musik">
            <svg id="musicIcon" viewBox="0 0 24 24" width="24" height="24" fill="#ff4d6d">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </button>

        <h1>🎉 Happy Birthday! 🎂</h1>

        <div class="cake-wrapper">
            <div class="candle">
                <div class="flame"></div>
            </div>
            <div class="cake"></div>
        </div>

        <div class="typing-container">
            <p class="text-message" id="typingText"></p><span class="cursor" id="cursor"></span>
        </div>

        <button class="btn-premium" id="surpriseBtn">🎁 Buka Kejutan</button>

        <div class="surprise-box" id="surpriseBox">
            <div class="surprise-card">
                Semoga senyummu hari ini tidak pernah hilang. Happy Birthday! ❤️
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="HBD.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* --- CONFIGURATION & GLOBAL VARIABLES --- */
        const textToType = "Selamat ulang tahun LIAAA! Semoga setiap langkahmu dipenuhi kebahagiaan, kesehatan, dan semua impianmu menjadi kenyataan. Terima kasih sudah menjadi orang yang luar biasa. Semoga hari ini menjadi awal dari tahun yang penuh cerita indah. Dan maafin aku kalau telat ngucapin yaaa";
        let typingIndex = 0;
        const typingSpeed = 50; // milidetik per karakter

        /* --- DOM ELEMENTS --- */
        const typingTextEl = document.getElementById('typingText');
        const cursorEl = document.getElementById('cursor');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const surpriseBox = document.getElementById('surpriseBox');
        const audioBtn = document.getElementById('audioBtn');
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        /* --- INITIALIZE CANVAS BACKGROUND --- */
        let particles = [];
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 0.5 + 0.1;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.3;
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();


        /* --- CELEBRATION EFFECTS (CONFETTI & HEARTS) --- */
        function createCelebrationElement(type) {
            const el = document.createElement('div');
            const isHeart = type === 'heart';
            
            el.style.position = 'fixed';
            el.style.zIndex = isHeart ? '12' : '5';
            el.style.pointerEvents = 'none';
            
            if (isHeart) {
                el.innerHTML = '❤️';
                el.style.fontSize = Math.random() * 20 + 15 + 'px';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.bottom = '-50px';
                el.style.animation = `floatUp ${Math.random() * 3 + 3}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
            } else {
                // Confetti
                el.style.width = Math.random() * 10 + 6 + 'px';
                el.style.height = Math.random() * 12 + 6 + 'px';
                const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#ffc2d1', '#c77dff', '#e0aaff', '#ffd166', '#06d6a0'];
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-20px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                const duration = Math.random() * 3 + 2;
                const spin = Math.random() * 360;
                el.style.transform = `rotate(${spin}deg)`;
                
                // Buat custom keyframe dinamis untuk lintasan jatuh jatuh konfeti
                const uniqueId = 'confetti-' + Math.random().toString(36).substr(2, 9);
                const styleSheet = document.createElement('style');
                const drift = (Math.random() - 0.5) * 200;
                styleSheet.innerText = `
                    @keyframes ${uniqueId} {
                        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                        100% { transform: translateY(105vh) translateX(${drift}px) rotate(${spin + 720}deg); opacity: 0; }
                    }
                `;
                document.head.appendChild(styleSheet);
                el.style.animation = `${uniqueId} ${duration}s linear forwards`;
                
                // Hapus style tag setelah selesai
                setTimeout(() => styleSheet.remove(), duration * 1000);
            }

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }

        function triggerConfettiBurst(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => createCelebrationElement('confetti'), i * 20);
            }
        }

        function triggerHeartsBurst(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => createCelebrationElement('heart'), i * 50);
            }
        }

        /* --- FLOATING BALLOONS GENERATOR --- */
        function spawnBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            
            const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#c77dff', '#b5e2fa', '#ffca3a'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            balloon.style.backgroundColor = randomColor;
            balloon.style.color = randomColor; // Untuk pseudo-element segitiga di bawah
            balloon.style.left = Math.random() * 90 + 5 + 'vw';
            
            // Variasi ukuran sedikit
            const scale = Math.random() * 0.3 + 0.85;
            balloon.style.transform = `scale(${scale})`;
            
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 9000);
        }

        function startBalloonsFlow() {
            // Semburkan beberapa balon di awal
            for(let i=0; i<6; i++) {
                setTimeout(spawnBalloon, i * 600);
            }
            // Interval berkelanjutan
            setInterval(spawnBalloon, 2500);
        }


        /* --- TYPING EFFECT LOGIC --- */
        function typeWriter() {
            if (typingIndex < textToType.length) {
                typingTextEl.innerHTML += textToType.charAt(typingIndex);
                typingIndex++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Hilangkan kursor secara halus setelah selesai mengetik
                setTimeout(() => {
                    cursorEl.style.display = 'none';
                }, 1000);
            }
        }


        /* --- MUSIC PLAYER CONTROL --- */
        audioBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(err => console.log("diputar dimana pun bisa"));
                // Ubah ke icon Pause
                musicIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            } else {
                bgMusic.pause();
                // Ubah kembali ke icon Play
                musicIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            }
        });


        /* --- SURPRISE BUTTON EVENT --- */
        surpriseBtn.addEventListener('click', () => {
            surpriseBox.classList.toggle('show');
            if (surpriseBox.classList.contains('show')) {
                triggerConfettiBurst(30);
                triggerHeartsBurst(15);
                surpriseBtn.innerText = "Nikmati Harimu!";
            } else {
                surpriseBtn.innerText = "🎁 Buka Kejutan";
            }
        });


        /* --- INITIAL ONLOAD TRIGGER --- */
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Semburan konfeti pembuka
            triggerConfettiBurst(50);
            // 2. Mulai aliran balon udara
            startBalloonsFlow();
            // 3. Jalankan efek mengetik dengan sedikit delay agar animasi box selesai dulu
            setTimeout(typeWriter, 1800);
        });
    </script>
</body>
</html>
